# Dependabot configuration - security updates only
# Version update PRs are disabled (open-pull-requests-limit: 0).
# Security updates bypass this limit and are always created.

version: 2
updates:
  # Python dependencies - root CDK project
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"

  # Python dependencies - app source
  - package-ecosystem: "uv"
    directory: "/app_src"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"
